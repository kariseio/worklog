# ===========================================================================
# 업무일지 생성기 설정. 이 파일을 `config.yaml` 로 복사해서 수정하세요.
#   cp config.example.yaml config.yaml      (또는:  worklog --init)
# 비밀 값(토큰/키)은 여기 두지 말고 .env 에 두세요.
# ===========================================================================

# 하루 경계를 계산할 기준 시간대.
timezone: Asia/Seoul

# 저장 파일 하단에 '수집 데이터 원본'(펼침) 부록을 포함할지. false = 요약·지표만 저장.
include_raw_data: false

sources:
  # --- ActivityWatch: 앱/창 사용 시간 ---
  activitywatch:
    enabled: true
    base_url: http://localhost:5600   # 로컬 aw-server. 미실행이면 자동으로 건너뜀.
    min_seconds: 60                   # 이 시간 미만으로 쓴 앱은 무시
    top_n: 20                         # 상위 N개 앱만 표시

  # --- Git: 그날의 커밋 ---
  git:
    enabled: true
    # 감시할 저장소를 직접 지정 (권장). 절대경로.
    repos:
      # - D:\works\agent-platform-frontend
      # - D:\kms-backend
    # 또는 이 폴더들 아래를 자동 탐색해서 .git 저장소를 찾음 (scan_depth 깊이까지).
    scan_roots:
      # - D:\works
      # - D:\study
    scan_depth: 2
    author: ""                        # 비우면 모든 작성자. 본인 것만 보려면 이름/이메일 지정.
    # Claude Code 로그에서 그날 작업한 프로젝트(cwd)를 자동으로 git 대상에 추가할지.
    include_claude_cwds: true

  # --- Claude Code 세션 로그: "무슨 작업을 했는지" ---
  claude:
    enabled: true
    projects_dir: ""                  # 비우면 ~/.claude/projects
    include_read: false               # Read(읽기 전용) 파일도 집계할지
    max_intent_len: 300               # 세션 의도(첫 프롬프트) 표시 최대 길이

  # --- NaverWorks 캘린더: 그날의 일정/회의 ---
  naverworks:
    enabled: false                    # .env 에 자격증명 채운 뒤 true 로
    user_id: ""                       # 캘린더 소유자 member ID (이메일). .env 로 넣어도 됨.
    calendar_id: ""                   # 비우면 기본 캘린더
    scope: calendar.read

# --- 종합(요약) 방식 ---
summarizer:
  provider: auto                      # auto | claude_cli | anthropic_api | none
  #  auto        : claude CLI 있으면 그걸로, 없으면 Anthropic API, 둘 다 없으면 요약 생략
  #  claude_cli  : 설치된 `claude` CLI (별도 API 키 불필요)
  #  anthropic_api: Anthropic SDK (ANTHROPIC_API_KEY 필요)
  #  none        : LLM 요약 없이 수집 데이터만 정리
  model: claude-opus-4-8
  language: ko
  max_tokens: 4000

# --- 출력: 여러 곳에 동시에 내보낼 수 있음 ---
outputs:
  markdown:
    enabled: true
    # 기본: '현재 로그인한 사용자'의 문서(Documents) 폴더 아래 '업무일지'에 YYYY-MM-DD.md 저장.
    #       (사용자명은 자동 감지 — 하드코딩 아님)
    # 다른 위치를 쓰려면 주석 해제 후 절대경로 지정:
    # dir: D:\내문서\업무일지
  obsidian:
    enabled: false
    vault_dir: ""                     # Obsidian vault 절대경로
    subdir: 업무일지                   # vault 안의 하위 폴더
  notion:
    enabled: false
    parent_type: page                 # page | database
    parent_id: ""                     # 부모 page_id 또는 database_id
    title_prop: Name                  # database 일 때 제목 속성 이름
    version: "2026-03-11"             # Notion-Version 헤더
